<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>NAUJTRATS · 个人版</title>
    <link rel="icon" type="image/png" sizes="16x16" href="./src/favicon-16x16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="./src/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="256x256" href="./src/favicon.png">
    <!-- 主脚本 (所有逻辑都迁移至此) -->
    <script src="./js/main.js"></script>
    <!-- 圆润字体 & 自定义样式 -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="flex h-screen overflow-hidden text-gray-800 dark:text-gray-200">
    <!-- Add language switcher to your index.html -->
    <div class="language-switcher">
      <a href="#en" onclick="switchLanguage('en')">English</a> | 
      <a href="#zh" onclick="switchLanguage('zh')">中文</a>
    </div>
    
    <script>
    function switchLanguage(lang) {
      localStorage.setItem('preferredLanguage', lang);
      // Load corresponding README or show language-specific content
    }
    </script>

    <!-- 侧边栏遮罩（用于点击关闭） -->
    <div id="sidebarMask" class="sidebar-mask" onclick="closeAllSidebars()"></div>
    <!-- 左侧历史侧栏 (宽度258px) -->
    <div id="sidebar" class="sidebar w-[258px] bg-gray-50 dark:bg-gray-900 border-r border-gray-200 dark:border-gray-800 flex flex-col p-4 z-20">
        <div class="flex items-center justify-between mb-6">
            <h2 class="font-bold text-gray-400 text-xs tracking-wider">历史记录</h2>
            <button onclick="window.toggleSidebar()" class="sidebar-collapse-btn text-gray-400 hover:text-blue-500 transition">❮</button>
        </div>
        <button onclick="window.createNewChat()" class="flex items-center justify-center gap-2 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-full py-2.5 mb-4 hover:shadow-sm transition text-sm font-medium text-blue-600">
            <span>+</span> 新建对话
        </button>
        <div id="chatHistoryList" class="flex-1 overflow-y-auto space-y-2"></div>
        <div class="mt-6 pt-4 border-t border-gray-200 dark:border-gray-800 space-y-3">
            <h3 class="text-xs font-bold text-gray-400 uppercase">上下文压缩</h3>
            <label class="flex items-center gap-2 text-xs">
                <input type="checkbox" id="compressToggle" class="rounded border-gray-300 text-blue-600 focus:ring-blue-500" onchange="window.saveConfig()">
                <span>启用压缩</span>
            </label>
            <div class="flex items-center gap-2 text-xs">
                <span>阈值:</span>
                <input type="number" id="compressThreshold" min="2" max="50" value="10" class="w-16 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-full px-2 py-1 text-xs outline-none">
            </div>
            <div class="flex items-center gap-2 text-xs">
                <span>模型:</span>
                <select id="compressModel" class="flex-1 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-full px-2 py-1 text-xs outline-none">
                    <option value="">默认</option>
                </select>
            </div>
        </div>
    </div>

    <!-- 中央主区 -->
    <div class="flex-1 flex flex-col min-w-0 bg-gray-50 dark:bg-gray-950">
        <header class="p-4 flex items-center justify-between border-b border-gray-200 dark:border-gray-800">
            <div class="flex items-center gap-4">
                <!-- 侧边栏展开按钮，默认隐藏，由 JS 控制显示 -->
                <button id="sidebarToggle" onclick="window.toggleSidebar()" class="header-menu-btn bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-full shadow-sm hover:bg-gray-100 dark:hover:bg-gray-700 transition" style="display: none;">☰</button>
                <div class="flex items-center gap-1">
                    <select id="modelSelect" onchange="window.saveConfig()" class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-full px-4 py-2 text-xs outline-none cursor-pointer"></select>
                    <button onclick="window.refreshModels(event)" class="p-2 rounded-full bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 shadow-sm hover:scale-105 transition" title="刷新模型列表">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                        </svg>
                    </button>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <button onclick="window.toggleDarkMode()" class="p-2 rounded-full bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 shadow-sm hover:scale-105 transition">
                    <svg id="themeIcon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path id="moonPath" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" class="dark:hidden"></path>
                        <path id="sunPath" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707" class="hidden dark:block"></path>
                    </svg>
                </button>
                <button onclick="window.toggleConfigPanel()" class="p-2 rounded-full bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 shadow-sm hover:scale-105 transition">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path>
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                    </svg>
                </button>
            </div>
        </header>

        <!-- 聊天区域 -->
        <div id="chatBox" class="flex-1 overflow-y-auto">
            <div id="chatMessagesContainer" class="chat-messages-container">
                <!-- 动态插入消息 -->
            </div>
            <!-- 回到底部按钮移到聊天区域内部 -->
            <div id="scrollToBottomBtn" class="scroll-to-bottom-btn" onclick="window.scrollToBottom()">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 14l-7 7-7-7m14-8l-7 7-7-7"></path>
                </svg>
            </div>
        </div>

        <!-- 输入区 -->
        <div class="input-area">
            <div id="filePreviewContainer" class="file-preview-container hidden"></div>
            <div class="input-wrapper">
                <div class="flex items-center gap-2 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-full p-2 shadow-sm focus-within:shadow-md transition">
                    <label class="cursor-pointer p-3 text-gray-400 hover:text-blue-500 transition">
                        <input type="file" id="fileInput" class="hidden" multiple accept=".txt,.md,.docx,.xlsx,.xls,.csv,.json,.js,.py,.html,.css,.xml,.log,.sh,.bat,.conf,.ini">
                        <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"></path>
                        </svg>
                    </label>
                    <textarea id="userInput" rows="1" class="flex-1 p-3 bg-transparent outline-none resize-none text-sm placeholder-gray-400 dark:placeholder-gray-500" placeholder="发送消息... 或拖拽文件至此"></textarea>
                    <div class="send-stop-container">
                        <button onclick="window.sendMessage()" id="sendBtn" class="send-btn">
                            <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path>
                            </svg>
                        </button>
                        <button onclick="window.stopGeneration()" id="stopBtn" class="stop-btn">
                            <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                            </svg>
                        </button>
                    </div>
                </div>
                <div id="dropOverlayInput" class="drop-overlay-input">
                    <svg class="drop-overlay-icon" viewBox="0 0 16 16" fill="currentColor" width="16" height="16">
                        <path d="M2 1.5C2 0.67 2.67 0 3.5 0h5.88c.4 0 .78.16 1.06.44l3.12 3.12c.28.28.44.66.44 1.06V14.5c0 .83-.67 1.5-1.5 1.5h-9c-.83 0-1.5-.67-1.5-1.5v-13zM3.5 1c-.28 0-.5.22-.5.5v13c0 .28.22.5.5.5h9c.28 0 .5-.22.5-.5V4.62L10.38 1H3.5z"/>
                        <path d="M9 1v3.5c0 .28.22.5.5.5H13v1H9.5C8.67 6 8 5.33 8 4.5V1h1z"/>
                    </svg>
                    拖拽文件至此
                </div>
            </div>
        </div>
    </div>

    <!-- 右侧配置面板 (宽度258px) -->
    <div id="configPanel" class="config-panel w-[258px] hidden-panel p-5 overflow-y-auto z-20">
        <div class="flex items-center justify-between mb-6">
            <h2 class="font-bold text-gray-400 text-xs tracking-wider">设置</h2>
            <button onclick="window.toggleConfigPanel()" class="text-gray-400 hover:text-gray-600 dark:hover:text-gray-200">✕</button>
        </div>
        <div class="space-y-5">
            <div>
                <label class="text-xs font-bold text-gray-400 uppercase">API Key</label>
                <input type="password" id="apiKey" onchange="window.saveConfig()" placeholder="请输入 API Key" class="w-full mt-1 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-full px-4 py-2 text-xs outline-none">
            </div>
            <div>
                <label class="text-xs font-bold text-gray-400 uppercase">Base URL</label>
                <input type="text" id="baseUrl" onchange="window.saveConfig()" class="w-full mt-1 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-full px-4 py-2 text-xs outline-none">
            </div>
            <div>
                <label class="text-xs font-bold text-gray-400 uppercase">System Prompt</label>
                <textarea id="systemPrompt" onchange="window.saveConfig()" rows="3" class="w-full mt-1 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-2xl px-4 py-2 text-xs outline-none resize-none"></textarea>
            </div>
            <hr class="border-gray-200 dark:border-gray-800">
            <div>
                <div class="flex justify-between items-center">
                    <label class="text-xs font-bold text-gray-400 uppercase">Temperature</label>
                    <span id="tempValue" class="text-xs text-blue-500">0.7</span>
                </div>
                <input type="range" id="temperature" min="0" max="2" step="0.1" value="0.7" oninput="window.updateParam('temp', this.value)" class="w-full h-1.5 bg-gray-200 dark:bg-gray-700 rounded-lg mt-2">
            </div>
            <div>
                <div class="flex justify-between items-center">
                    <label class="text-xs font-bold text-gray-400 uppercase">Max Tokens</label>
                    <input type="number" id="maxTokensInput" min="256" max="65536" step="256" value="4096" onchange="window.syncTokenFromInput()" class="w-20 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-full px-2 py-1 text-xs text-right">
                </div>
                <input type="range" id="maxTokens" min="256" max="65536" step="256" value="4096" oninput="window.syncTokenFromRange()" class="w-full h-1.5 bg-gray-200 dark:bg-gray-700 rounded-lg mt-2">
            </div>
            <div class="flex items-center justify-between bg-gray-100 dark:bg-gray-800 p-3 rounded-2xl">
                <label class="text-xs font-medium">流式输出</label>
                <input type="checkbox" id="streamToggle" class="rounded border-gray-300 text-blue-600" checked onchange="window.saveConfig()">
            </div>
            <div class="flex items-center justify-between bg-gray-100 dark:bg-gray-800 p-3 rounded-2xl">
                <label class="text-xs font-medium">思考延迟(ms)</label>
                <input type="number" id="reasoningDelay" min="1" max="100" value="25" class="w-20 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-full px-2 py-1 text-xs text-center" onchange="window.saveConfig()">
            </div>
            <div class="flex items-center justify-between bg-gray-100 dark:bg-gray-800 p-3 rounded-2xl">
                <label class="text-xs font-medium">正文延迟(ms)</label>
                <input type="number" id="contentDelay" min="1" max="100" value="12" class="w-20 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-full px-2 py-1 text-xs text-center" onchange="window.saveConfig()">
            </div>
            <div class="flex items-center justify-between bg-gray-100 dark:bg-gray-800 p-3 rounded-2xl">
                <label class="text-xs font-medium">请求超时(秒)</label>
                <input type="number" id="requestTimeout" min="10" max="300" value="60" class="w-20 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-full px-2 py-1 text-xs text-center" onchange="window.saveConfig()">
            </div>

            <hr class="border-gray-200 dark:border-gray-800">
            <div class="space-y-3">
                <h3 class="text-xs font-bold text-gray-400 uppercase">显示设置</h3>
                <div>
                    <div class="flex justify-between items-center">
                        <label class="text-xs text-gray-500">行距</label>
                        <span id="lineHeightValue" class="text-xs text-blue-500">1.1</span>
                    </div>
                    <input type="range" id="lineHeight" min="1.0" max="2.5" step="0.01" value="1.1" oninput="window.updateDisplayParam('lineHeight', this.value)" class="w-full h-1.5 bg-gray-200 dark:bg-gray-700 rounded-lg mt-1">
                </div>
                <div>
                    <div class="flex justify-between items-center">
                        <label class="text-xs text-gray-500">段间距 (rem)</label>
                        <span id="paragraphMarginValue" class="text-xs text-blue-500">0.10</span>
                    </div>
                    <input type="range" id="paragraphMargin" min="0" max="0.5" step="0.01" value="0.1" oninput="window.updateDisplayParam('paragraphMargin', this.value)" class="w-full h-1.5 bg-gray-200 dark:bg-gray-700 rounded-lg mt-1">
                </div>
                <div class="flex items-center justify-between">
                    <label class="text-xs text-gray-500">段落前缀</label>
                    <select id="paragraphPrefix" onchange="window.updateParagraphPrefix()" class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-full px-2 py-1 text-xs outline-none">
                        <option value="none">无</option>
                        <option value="dot">• 圆点</option>
                        <option value="dash">- 短横</option>
                    </select>
                </div>
                <div class="flex items-center justify-between">
                    <label class="text-xs text-gray-500">Markdown GFM</label>
                    <input type="checkbox" id="markdownGFM" class="rounded border-gray-300 text-blue-600" checked onchange="window.updateMarkdownConfig()">
                </div>
                <div class="flex items-center justify-between">
                    <label class="text-xs text-gray-500">Markdown 换行</label>
                    <input type="checkbox" id="markdownBreaks" class="rounded border-gray-300 text-blue-600" checked onchange="window.updateMarkdownConfig()">
                </div>
            </div>

            <div>
                <div class="flex items-center justify-between">
                    <label class="text-xs font-bold text-gray-400 uppercase">自定义参数</label>
                    <label class="flex items-center gap-1 text-xs">
                        <input type="checkbox" id="customParamsToggle" class="rounded border-gray-300 text-blue-600" onchange="window.saveConfig()">
                        <span>启用</span>
                    </label>
                </div>
                <textarea id="customParams" onchange="window.saveConfig()" rows="2" class="w-full mt-1 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-2xl px-4 py-2 text-xs outline-none resize-none" placeholder='{"top_p": 0.9}'></textarea>
            </div>
        </div>
    </div>

    <!-- 内联脚本：移动端侧边栏逻辑（已修复键盘导致面板关闭的问题） -->
    <script>
        (function() {
            // 移动端判断
            function isMobile() {
                return window.innerWidth <= 786;
            }

            // 关闭所有移动端侧边栏（供遮罩调用）
            window.closeAllSidebars = function() {
                if (!isMobile()) return;
                document.getElementById('sidebar').classList.remove('mobile-open');
                document.getElementById('configPanel').classList.remove('mobile-open');
                document.getElementById('sidebarMask').classList.remove('active');
            };

            // 保存原始函数引用（如果需要可调用）
            const origToggleSidebar = window.toggleSidebar;
            const origToggleConfigPanel = window.toggleConfigPanel;

            // 重写左侧边栏切换
            window.toggleSidebar = function() {
                if (isMobile()) {
                    const sidebar = document.getElementById('sidebar');
                    const configPanel = document.getElementById('configPanel');
                    const mask = document.getElementById('sidebarMask');
                    
                    // 如果左侧边栏正在关闭，则打开它，并关闭右侧面板
                    if (!sidebar.classList.contains('mobile-open')) {
                        sidebar.classList.add('mobile-open');
                        configPanel.classList.remove('mobile-open'); // 关闭右侧
                        mask.classList.add('active');
                    } else {
                        sidebar.classList.remove('mobile-open');
                        mask.classList.remove('active');
                    }
                } else {
                    // 桌面端：原有折叠逻辑
                    const sidebar = document.getElementById('sidebar');
                    const toggleBtn = document.getElementById('sidebarToggle');
                    sidebar.classList.toggle('collapsed');
                    toggleBtn.style.display = sidebar.classList.contains('collapsed') ? 'block' : 'none';
                }
            };

            // 重写右侧配置面板切换
            window.toggleConfigPanel = function() {
                if (isMobile()) {
                    const configPanel = document.getElementById('configPanel');
                    const sidebar = document.getElementById('sidebar');
                    const mask = document.getElementById('sidebarMask');
                    
                    if (!configPanel.classList.contains('mobile-open')) {
                        configPanel.classList.add('mobile-open');
                        sidebar.classList.remove('mobile-open'); // 关闭左侧
                        mask.classList.add('active');
                    } else {
                        configPanel.classList.remove('mobile-open');
                        mask.classList.remove('active');
                    }
                } else {
                    // 桌面端：原有逻辑
                    document.getElementById('configPanel').classList.toggle('hidden-panel');
                }
            };

            // 窗口大小变化时，如果从移动端切回桌面，重置状态
            // 修复：当键盘弹出时（keyboardActive = true），不执行关闭面板操作
            window.addEventListener('resize', function() {
                // 新增：键盘激活时不关闭面板
                if (window.keyboardActive) return;

                if (!isMobile()) {
                    // 恢复桌面端默认显示（侧边栏可见，配置面板隐藏）
                    document.getElementById('sidebar').classList.remove('mobile-open', 'collapsed');
                    document.getElementById('configPanel').classList.remove('mobile-open', 'hidden-panel');
                    document.getElementById('sidebarMask').classList.remove('active');
                    // 确保桌面端侧边栏可见（移除可能干扰的类）
                    document.getElementById('sidebar').classList.remove('collapsed');
                    document.getElementById('configPanel').classList.add('hidden-panel');
                    // 汉堡菜单隐藏（由桌面端原始逻辑控制，但重置一下）
                    document.getElementById('sidebarToggle').style.display = 'none';
                } else {
                    // 进入移动端时，确保侧边栏隐藏，配置面板隐藏
                    document.getElementById('sidebar').classList.remove('mobile-open', 'collapsed');
                    document.getElementById('configPanel').classList.remove('mobile-open', 'hidden-panel');
                    document.getElementById('sidebarMask').classList.remove('active');
                }
            });
        })();
    </script>
</body>

</html>
